name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" "ruff==0.4.4"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  go-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apigo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: apigo/go.sum

      - name: Resolve modules
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  # Build the three app images once and push to GHCR, tagged by commit SHA (the
  # fleet's version) + :main. Hosts pull these instead of building on-box. Only
  # runs on green main pushes — never on PRs.
  build-images:
    needs: [lint-and-test, go-api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { image: telegram-cms-python, context: ".",     dockerfile: Dockerfile.python }
          - { image: telegram-cms-api,    context: ./apigo, dockerfile: apigo/Dockerfile }
          - { image: telegram-cms-web,    context: ./web,   dockerfile: web/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/amirdvl/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/amirdvl/${{ matrix.image }}:main
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
