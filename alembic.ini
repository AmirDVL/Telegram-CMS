[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# This value is overridden at runtime by migrations/env.py which reads
# POSTGRES_DSN from the environment via shared.config.get_settings().
# Do not store real credentials here — this file is committed to VCS.
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@localhost/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
