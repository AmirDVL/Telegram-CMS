services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cms}
      POSTGRES_DB: cms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Local telegram-bot-api server: bypasses the 50 MB cloud upload limit (≤2 GB).
  # Profile-gated: when `largemedia` is off, the bot falls back to the cloud
  # Telegram API (50 MB cap) — see bot/client.py.
  botapi:
    image: aiogram/telegram-bot-api:latest
    profiles: [largemedia]
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
      # Max size of a file being downloaded/uploaded by the bot (bytes). 2 GB.
      TELEGRAM_API_FILES_SIZE_LIMIT: ${MEDIA_MAX_SIZE_DEFAULT:-2147483648}
    volumes:
      - botapidata:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ARQ worker: normalization + dedupe pruning + publish reconcile.
  worker:
    image: ghcr.io/amirdvl/telegram-cms-python:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "worker"]
    volumes:
      - media:/media
      - sessiondata:/data/sessions
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Userbot (Telethon MTProto): reads third-party source channels + downloads media.
  userbot:
    image: ghcr.io/amirdvl/telegram-cms-python:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "userbot"]
    volumes:
      - media:/media
      - sessiondata:/data/sessions
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Bot API bot (aiogram 3): admin surface + publish worker + delayed scheduled jobs.
  bot:
    image: ghcr.io/amirdvl/telegram-cms-python:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "bot"]
    volumes:
      - media:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Back-office API — Go (apigo/). A static distroless binary replacing the
  # FastAPI/uvicorn image for a much smaller footprint. Serves the same /api
  # surface the Next.js web expects (Caddy strips /api before proxying).
  # Rollback: point build at Dockerfile.python with command
  # ["uvicorn","api.main:app","--host","0.0.0.0","--port","8000"].
  api:
    image: ghcr.io/amirdvl/telegram-cms-api:${IMAGE_TAG:-local}
    build:
      context: ./apigo
      dockerfile: Dockerfile
    profiles: [backoffice]
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot Python image for DB migrations + seeding. The api service is now Go
  # (no Alembic), so schema management lives here. Never started by `up` (its
  # `migrate` profile is not in any tier); invoked via `… run --rm migrate`.
  migrate:
    image: ghcr.io/amirdvl/telegram-cms-python:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile.python
    profiles: [migrate]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "api.cli", "migrate"]
    restart: "no"

  # Next.js web back-office.
  web:
    image: ghcr.io/amirdvl/telegram-cms-web:${IMAGE_TAG:-local}
    build:
      context: ./web
      dockerfile: Dockerfile
    profiles: [backoffice]
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${WEB_PUBLIC_API_URL:-https://${APP_DOMAIN}/api}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Caddy: reverse proxy + automatic TLS for web + api.
  caddy:
    image: caddy:2-alpine
    profiles: [backoffice]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    depends_on:
      - web
      - api

volumes:
  pgdata:
  redisdata:
  botapidata:
  media:
  sessiondata:
  caddydata:
  caddyconfig:
